services:
  nginx:
    image: nginx:alpine
    container_name: prime-hrm-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: prime-hrm-frontend
    expose:
      - "8080"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prime-hrm-backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
    restart: unless-stopped
